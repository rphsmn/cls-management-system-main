<div class="approvals-container">
  <div class="content-card">
    <div *ngIf="requests$ | async as requests">
      <div *ngIf="hasPendingRequests(requests); else noRequests">
        <table>
          <thead>
            <tr>
              <th>Employee</th>
              <th>Type</th>
              <th>Reason</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let req of requests">
              <td>{{ req.requesterName }}</td>
              <td>{{ req.type }}</td>
              <td>{{ req.reason }}</td>
              <td>
                <button class="btn-approve" (click)="updateStatus(req, 'Approve')">Approve</button>
                <button class="btn-reject" (click)="updateStatus(req, 'Reject')">Reject</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      <ng-template #noRequests>
        <p>No pending approvals found.</p>
      </ng-template>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="showModal">
    <div class="modal-content">
      <h3>Confirm {{ pendingAction }}</h3>
      <p>Are you sure you want to {{ pendingAction?.toLowerCase() }} this request?</p>
      <div class="modal-actions">
        <button (click)="closeModal()">Cancel</button>
        <button [class.btn-danger]="pendingAction === 'Reject'" (click)="confirmAction()">Confirm</button>
      </div>
    </div>
  </div>
</div>
