<div class="auth-container">
  <div class="auth-card">
    
    <div *ngIf="!isSent" class="fade-in">
      <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Enter your corporate email and we'll send you a recovery link.</p>
      </div>

      <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
        <div class="input-group">
          <label>Corporate Email</label>
          <input 
            type="email" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="e.g. employee@corlogics.com" 
            required
            email>
        </div>

        <div *ngIf="errorMessage" class="error-box">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="!forgotForm.form.valid || isLoading">
          <span *ngIf="!isLoading">SEND RECOVERY LINK</span>
          <div *ngIf="isLoading" class="spinner"></div>
        </button>
      </form>

      <div class="auth-footer">
        <a routerLink="/login" class="back-link">← Back to Login</a>
      </div>
    </div>

    <div *ngIf="isSent" class="success-view fade-in">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      
      <h2>Check your email</h2>
      <p class="success-subtext">A recovery link has been sent to:</p>
      <div class="email-badge">{{ email }}</div>

      <div class="expiry-tip">
        <strong>Tip:</strong> The link will expire in 60 minutes. If you don't see it, check your junk folder.
      </div>
      
      <button class="btn-secondary" routerLink="/login">BACK TO LOGIN</button>
      
      <div class="resend-container">
        Didn't receive it? 
        <button 
          class="resend-link" 
          [disabled]="resendCountdown > 0" 
          (click)="handleTryAgain()">
          {{ resendCountdown > 0 ? 'Try again in ' + resendCountdown + 's' : 'Try again' }}
        </button>
      </div>
    </div>

  </div>
</div>
