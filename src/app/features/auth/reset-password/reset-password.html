<div class="auth-container">
  <div class="auth-card">
    
    <div *ngIf="!isSuccess" class="fade-in">
      <div class="auth-header">
        <h2>Set New Password</h2>
        <p>Almost there! Create a new secure password for your account.</p>
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
        <div class="input-group">
          <label>New Password</label>
          <input 
            [type]="passwordVisible ? 'text' : 'password'" 
            formControlName="password" 
            placeholder="Min. 8 characters">
        </div>

        <div class="input-group">
          <label>Confirm New Password</label>
          <input 
            [type]="passwordVisible ? 'text' : 'password'" 
            formControlName="confirmPassword" 
            placeholder="Repeat password">
          <small *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched" class="error-text">
            Passwords do not match.
          </small>
        </div>

        <button type="submit" class="btn-primary" [disabled]="resetForm.invalid || isLoading">
          <span *ngIf="!isLoading">UPDATE PASSWORD</span>
          <div *ngIf="isLoading" class="spinner"></div>
        </button>
      </form>

      <div class="auth-footer">
        <a routerLink="/login" class="back-link">← Back to Login</a>
      </div>
    </div>

    <div *ngIf="isSuccess" class="success-view fade-in">
      <div class="success-icon">✓</div>
      <h2>Password Updated!</h2>
      <p>Your password has been changed successfully. You can now sign in with your new credentials.</p>
      <button class="btn-primary" routerLink="/login">PROCEED TO LOGIN</button>
    </div>

  </div>
</div>
