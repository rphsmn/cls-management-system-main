<div class="history-container">
  <header class="main-header">
    <button routerLink="/dashboard" class="back-link">
      <span class="arrow">←</span> BACK TO DASHBOARD
    </button>
    <h1 class="page-title">My Leave History</h1>
  </header>

  <main class="content">
    <div class="table-card">
      <table class="history-table">
        <thead>
          <tr>
            <th>Date Filed</th>
            <th>Leave Type</th>
            <th>Period</th>
            <th>Reason</th>
            <th class="progress-col">Approval Progress</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let req of (requests$ | async)">
            <td>{{ req.dateFiled | date:'MMM dd, yyyy' }}</td>
            <td>{{ req.leaveType }}</td>
            <td>{{ req.period }}</td>
            <td class="reason-text">"{{ req.reason }}"</td>
            <td>
              <div class="progress-track">
                <div class="step completed">
                  <div class="icon-circle">✓</div>
                  <span class="step-label">Filed</span>
                </div>

                <div class="connector" [class.green]="req.status !== 'Rejected'"></div>

                <div class="step" [class.completed]="req.stage === 'Final' || req.status === 'Approved'" 
                                  [class.rejected]="req.status === 'Rejected' && req.stage === 'Initial'">
                  <div class="icon-circle">
                    <ng-container *ngIf="req.stage === 'Final' || req.status === 'Approved'">✓</ng-container>
                    <ng-container *ngIf="req.status === 'Rejected' && req.stage === 'Initial'">✕</ng-container>
                    <ng-container *ngIf="req.status === 'Pending' && req.stage === 'Initial'">?</ng-container>
                  </div>
                  <span class="step-label">Supervisor</span>
                </div>

                <div class="connector" [class.green]="req.stage === 'Final' || req.status === 'Approved'"></div>

                <div class="step" [class.completed]="req.status === 'Approved' && req.stage === 'Final'"
                                  [class.rejected]="req.status === 'Rejected' && req.stage === 'Final'">
                  <div class="icon-circle">
                    <ng-container *ngIf="req.status === 'Approved'">✓</ng-container>
                    <ng-container *ngIf="req.status === 'Rejected' && req.stage === 'Final'">✕</ng-container>
                    <ng-container *ngIf="req.status === 'Pending'">3</ng-container>
                  </div>
                  <span class="step-label">HR</span>
                </div>
              </div>
            </td>
          </tr>
          
          <tr *ngIf="(requests$ | async)?.length === 0">
            <td colspan="5" style="text-align: center; padding: 40px; color: #94a3b8;">
              No leave history found.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
