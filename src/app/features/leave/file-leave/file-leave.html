<div class="file-leave-container">
<header class="main-header">
  <button routerLink="/dashboard" class="back-link">
    <span class="arrow">←</span> Back to Dashboard
  </button>
  </header>

  <main class="content">
    <div class="form-card">
      <form (submit)="submitLeave(); $event.preventDefault()">
        <div class="input-group">
          <label>Leave Type</label>
          <select [(ngModel)]="leaveType" name="leaveType">
            <option value="Paid Leave">Paid Leave (VL)</option>
            <option value="Sick Leave">Sick Leave (SL)</option>
            <option value="Birthday Leave">Birthday Leave</option>
          </select>
        </div>

        <div class="input-group">
          <label>Period</label>
          <div class="date-row">
            <div class="date-input">
              <span class="date-label">Start Date</span>
              <input type="date" [(ngModel)]="startDate" name="startDate" required>
            </div>
            <div class="date-input">
              <span class="date-label">End Date</span>
              <input type="date" [(ngModel)]="endDate" name="endDate" required>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label>Reason for Leave</label>
          <textarea [(ngModel)]="leaveReason" name="reason" placeholder="e.g. Attending a family event"></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit Request</button>
      </form>
    </div>
  </main>
</div>
