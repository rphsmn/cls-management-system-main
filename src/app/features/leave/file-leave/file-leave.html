<div class="toast-wrapper" *ngIf="showSuccessToast">
  <div class="toast-container">
    <div class="toast-content">
      <div class="toast-icon">✓</div>
      <div class="toast-body">
        <strong>SUBMISSION SUCCESSFUL</strong>
        <span>Your leave request is now pending review.</span>
      </div>
    </div>
  </div>
</div>

<main class="file-leave-container" *ngIf="liveCredits$ | async as currentUser">
  <div class="content-header">
    <div class="title-section">
      <h1>File a Request</h1>
      <div class="sub-header">
        <span class="role-badge">{{ currentUser.role }}</span>
        <span class="status-text">Submit your leave application for approval</span>
      </div>
    </div>
  </div>

  <div class="content-card">
    <form (ngSubmit)="onSubmit()" #leaveForm="ngForm" class="leave-form">
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Leave Type</label>
          <select name="type" [(ngModel)]="leaveRequest.type" required>
            <option value="" disabled selected>Select type of leave</option>
            <option value="Paid Leave">Paid Leave</option>
            <option value="Sick Leave">Sick Leave</option>
            <option value="Birthday Leave">Birthday Leave</option>
          </select>
        </div>

        <div class="form-group">
          <label>Start Date</label>
          <input type="date" name="startDate" [(ngModel)]="leaveRequest.startDate" required>
        </div>

        <div class="form-group">
          <label>End Date</label>
          <input type="date" name="endDate" [(ngModel)]="leaveRequest.endDate" required>
        </div>

        <div class="form-group full-width">
          <label>Reason for Leave</label>
          <textarea 
            name="reason" 
            [(ngModel)]="leaveRequest.reason" 
            placeholder="Provide a brief explanation..."
            rows="4" 
            required></textarea>
        </div>

        <div class="form-group full-width">
          <label>Attachment (Optional: Medical Cert / Documents)</label>
          <div class="attachment-upload-box" (click)="fileInput.click()" [class.has-file]="fileName">
            <input type="file" (change)="onFileSelected($event)" #fileInput hidden>
            <div class="upload-content">
              <span class="upload-icon">{{ fileName ? '✅' : '📎' }}</span>
              <span class="upload-text">{{ fileName || 'Click to upload a supporting document' }}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" routerLink="/dashboard">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="!leaveForm.valid">Submit Request</button>
      </div>
    </form>
  </div>
</main>
