<div class="dashboard-container" *ngIf="currentUser$ | async as currentUser">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-dot"></div>
      <h2>COR LOGIC</h2>
    </div>
    
    <div class="sidebar-content">
      <ul class="nav-menu">
        <li routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">Dashboard</li>
        <li routerLink="/file-leave" routerLinkActive="active-link">File Leave</li>
        <li routerLink="/history" routerLinkActive="active-link">History / Tracker</li>
        <li routerLink="/calendar" routerLinkActive="active-link">Company Calendar</li> 
        
        <li *ngIf="currentUser.role.includes('Supervisor') || currentUser.role.includes('Manager') || currentUser.role === 'HR'" 
            routerLink="/approvals" 
            routerLinkActive="active-link">
          Approvals
        </li>
        
        <li routerLink="/profile" routerLinkActive="active-link">Profile</li>
      </ul>
    </div>

    <div class="sidebar-footer">
      <button class="logout-btn-sidebar" (click)="confirmLogout()">Logout</button>
    </div>
  </aside>

  <main class="content-wrapper">
    <router-outlet></router-outlet>
  </main>

  <div class="modal-overlay" *ngIf="showLogoutModal">
    <div class="modal-card">
      <div class="modal-icon">!</div>
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to log out, {{ currentUser.name }}?</p>
      
      <div class="modal-actions">
        <button class="btn-cancel" (click)="cancelLogout()">Cancel</button>
        <button class="btn-confirm" (click)="executeLogout()">Log Out</button>
      </div>
    </div>
  </div>
</div>
